<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLP Security - Dock Management Platform</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151c2c;
            --accent-color: #f59e0b; /* Amber/Yellow glow */
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #1e293b;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        header h1 span {
            color: var(--accent-color);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Metrics Layout */
        .metrics-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            grid-column: 1 / -1;
            margin-bottom: 1.5rem;
        }

        .metric-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-color);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }

        .metric-card .num {
            font-size: 2rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .metric-card .label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
            text-transform: uppercase;
        }

        button:hover { opacity: 0.9; }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        tr:hover td { background-color: rgba(255,255,255,0.02); }

        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .badge.in { background-color: rgba(16, 185, 129, 0.2); color: var(--success-color); }
        .badge.out { background-color: rgba(239, 68, 68, 0.2); color: #ef4444; }
    </style>
</head>
<body>

    <header>
        <h1>SLP <span>Security Platform</span></h1>
        <div style="color: var(--text-muted); font-size: 0.9rem;">Status: <span style="color: var(--success-color)">● Live Connection</span></div>
    </header>

    <div class="metrics-bar">
        <div class="metric-card">
            <div class="num" id="metric-total">0</div>
            <div class="label">Total Check-Ins</div>
        </div>
        <div class="metric-card" style="border-left-color: #10b981;">
            <div class="num" id="metric-inbound">0</div>
            <div class="label">Active Inbound</div>
        </div>
        <div class="metric-card" style="border-left-color: #3b82f6;">
            <div class="num" id="metric-docks">0</div>
            <div class="label">Docks Utilized</div>
        </div>
    </div>

    <div class="dashboard-grid">
        
        <div class="card">
            <h2>Truck Entry Form</h2>
            <form id="entryForm">
                <div class="form-group">
                    <label>Driver Name</label>
                    <input type="text" id="driverName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Plate Number</label>
                    <input type="text" id="plateNumber" required placeholder="ABC-1234">
                </div>
                <div class="form-group">
                    <label>Security Officer</label>
                    <input type="text" id="securityName" required placeholder="Officer Smith">
                </div>
                <div class="form-group">
                    <label>Dock Assignment</label>
                    <select id="dockNumber">
                        <option value="Dock 1">Dock 1</option>
                        <option value="Dock 2">Dock 2</option>
                        <option value="Dock 3">Dock 3</option>
                        <option value="Dock 4">Dock 4</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Direction</label>
                    <select id="direction">
                        <option value="Inbound">Inbound (Check-In)</option>
                        <option value="Outbound">Outbound (Check-Out)</option>
                    </select>
                </div>
                <button type="submit" id="submitBtn">Submit Log</button>
            </form>
        </div>

        <div class="card" style="overflow-x: auto;">
            <h2>Live Activity Feed</h2>
            <table>
                <thead>
                    <tr>
                        <th>Driver</th>
                        <th>Plate</th>
                        <th>Dock</th>
                        <th>Direction</th>
                        <th>Officer</th>
                    </tr>
                </thead>
                <tbody id="liveFeedBody">
                    <tr>
                        <td colspan="5" style="text-align: center; color: var(--text-muted);">Loading logs...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE:
        const API_URL = "https://script.google.com/macros/s/AKfycbymkKq83eluzEBtKo_NEf6Bhebu0O7_OJS5XzO73tQcqqr_aspE5hgTiYrBOBWllw6NUQ/exec";

        // Fetch Logs from Google Sheet on page load
        async function fetchLogs() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const tbody = document.getElementById('liveFeedBody');
                tbody.innerHTML = ''; // Clear loading state
                
                if(data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">No entries recorded today.</td></tr>`;
                    return;
                }

                // Update Metrics counts
                document.getElementById('metric-total').innerText = data.length;
                let inboundCount = data.filter(item => item.direction === 'Inbound').length;
                document.getElementById('metric-inbound').innerText = inboundCount;
                
                let uniqueDocks = [...new Set(data.map(item => item.dockNumber))].length;
                document.getElementById('metric-docks').innerText = uniqueDocks;

                // Render Table rows (latest entries on top)
                data.reverse().forEach(row => {
                    const tr = document.createElement('tr');
                    const badgeClass = row.direction.toLowerCase() === 'inbound' ? 'in' : 'out';
                    
                    tr.innerHTML = `
                        <td><strong>${row.driverName}</strong></td>
                        <td>${row.plateNumber}</td>
                        <td>${row.dockNumber}</td>
                        <td><span class="badge ${badgeClass}">${row.direction}</span></td>
                        <td style="color: var(--text-muted); font-size:0.85rem;">${row.securityName}</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        // Post Form Data to Google Sheet
        document.getElementById('entryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            const payload = {
                driverName: document.getElementById('driverName').value,
                plateNumber: document.getElementById('plateNumber').value,
                securityName: document.getElementById('securityName').value,
                dockNumber: document.getElementById('dockNumber').value,
                direction: document.getElementById('direction').value
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Bypasses browser CORS rules safely for Apps Script
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Clear Form and reload logs
                document.getElementById('entryForm').reset();
                submitBtn.innerText = "Submit Log";
                submitBtn.disabled = false;
                
                // Fetch new logs after a brief pause for Google to process
                setTimeout(fetchLogs, 1500);

            } catch (error) {
                alert("Error saving log. Check your setup.");
                submitBtn.innerText = "Submit Log";
                submitBtn.disabled = false;
            }
        });

        // Initialize dashboard logs on load
        fetchLogs();
    </script>
</body>
</html>
